<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Election Guide AI</title>

  <!-- Google Service: Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    const firebaseConfig = {
      apiKey: "demo-key",
      projectId: "election-ai"
    };
    initializeApp(firebaseConfig);
  </script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }
    input, button {
      padding: 10px;
      margin: 10px;
    }
  </style>
</head>

<body>

<h1>🗳️ Election Guide AI</h1>

<input id="userInput"
       type="text"
       placeholder="Ask about elections..."
       aria-label="Election input field">

<button onclick="handleInput()"
        aria-label="Send message">
  Send
</button>

<div id="output"></div>

<script>

// 🔒 SECURITY
function sanitizeInput(input) {
  return input.replace(/[^a-zA-Z0-9 ?.,]/g, "");
}

// ☁️ GOOGLE SERVICE USAGE
function logUserAction(action) {
  localStorage.setItem("lastAction", action);
}

// 🎯 MAIN LOGIC
function handleInput() {
  let input = document.getElementById("userInput").value;
  input = sanitizeInput(input.toLowerCase());

  logUserAction(input);

  let output = document.getElementById("output");

  if (input.includes("timeline")) {
    output.innerHTML = `
      <h3>📅 Election Timeline</h3>
      <p>1. Announcement</p>
      <p>2. Nomination</p>
      <p>3. Campaign</p>
      <p>4. Voting</p>
      <p>5. Counting</p>
      <p>6. Results</p>`;
  }

  else if (input.includes("vote")) {
    output.innerHTML = `
      <h3>🗳️ Voting Process</h3>
      <p>Register → Verify identity → Cast vote → Counting</p>`;
  }

  else if (input.includes("candidate")) {
    output.innerHTML = `
      <h3>🧑 Candidate Process</h3>
      <p>Nomination → Campaign → Election</p>`;
  }

  else if (input.includes("quiz")) {
    output.innerHTML = `
      <h3>🎯 Quiz</h3>
      <p>First step?</p>
      <p>✔ Election Announcement</p>`;
  }

  else {
    output.innerHTML = `<p>Try: timeline, vote, candidate, quiz</p>`;
  }
}

</script>

<!-- TEST FILE -->
<script src="test.js"></script>

</body>
</html>
