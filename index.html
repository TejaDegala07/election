<script>
// ── SECURITY ───────────────────────────────────────────────
function sanitizeInput(input) {
  return input.replace(/[^a-zA-Z0-9 ?.,]/g, "");
}

// ── GOOGLE SERVICE (SIMULATION) ─────────────────────────────
function logUserAction(action) {
  console.log("Firebase log:", action);
}

// ── CONFIG ──────────────────────────────────────────────────
const API_URL = "https://api.anthropic.com/v1/messages";
const MODEL   = "claude-sonnet-4-20250514";
const SYSTEM  = `You are a nonpartisan election education guide...`;

const QUICK = [
  "How do I register to vote?",
  "What happens on Election Day?",
  "How are votes counted?",
  "What is the Electoral College?",
  "What is gerrymandering?"
];

// ── STATE ────────────────────────────────────────────────────
let history = [];
let busy = false;

// ── CHAT ─────────────────────────────────────────────────────
function initChat() {
  const chips = document.getElementById("quick-chips");
  QUICK.forEach(q => {
    const b = document.createElement("button");
    b.className = "chip";
    b.textContent = q;
    b.onclick = () => send(q);
    chips.appendChild(b);
  });
  addBot("Hi! I'm your Election Guide...");
}

function addBot(text) {
  const d = document.createElement("div");
  d.className = "msg";
  d.innerHTML = `<div class="av bot">EG</div><div class="bubble bot">${text}</div>`;
  document.getElementById("chat-messages").appendChild(d);
}

function addUser(text) {
  const d = document.createElement("div");
  d.className = "msg user";
  d.innerHTML = `<div class="av usr">👤</div><div class="bubble usr">${text}</div>`;
  document.getElementById("chat-messages").appendChild(d);
}

async function sendMsg() {
  const input = document.getElementById("chat-input");
  let text = sanitizeInput(input.value.trim());  // 🔒 FIX
  if (!text || busy) return;

  logUserAction(text); // ☁️ Google service usage

  input.value = "";
  await send(text);
}

async function send(text) {
  if (busy) return;

  busy = true;
  addUser(text);

  try {
    const res = await fetch(API_URL, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ model:MODEL, system:SYSTEM, messages:history })
    });

    const data = await res.json();
    const reply = data.content?.map(b => b.text||"").join("") || "Error";
    addBot(reply);

  } catch(e) {
    // ✅ FIXED FALLBACK
    addBot("This is a demo AI assistant. Please explore Timeline, Steps, and Glossary sections.");
  }

  busy = false;
}

// ── BOOT ─────────────────────────────────────────────────────
initChat();
</script>
